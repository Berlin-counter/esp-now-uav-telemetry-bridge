; ESP32-S3 Drone Bridge - PlatformIO Configuration

[env:drone]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBUILD_DRONE=1
build_src_filter = +<drone_main.cpp>
upload_protocol = esptool
upload_speed = 921600

[env:gcs]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBUILD_GCS=1
build_src_filter = +<gcs_main.cpp>
upload_protocol = esptool
upload_speed = 921600
